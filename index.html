<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Кейтеринг — 18 апреля</title>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Arial, sans-serif;
      background: #0b1220;
      color: #eaf0ff;
    }
    header {
      padding: 18px 16px;
      border-bottom: 1px solid rgba(255,255,255,.12);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,0));
      position: sticky;
      top: 0;
      backdrop-filter: blur(8px);
      z-index: 10;
    }
    header h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: .2px;
    }
    header p {
      margin: 6px 0 0;
      font-size: 13px;
      opacity: .85;
    }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 16px; }

    .frame {
      width: 100%;
      height: calc(100vh - 140px);
      min-height: 520px;
      border: 0;
      border-radius: 14px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 16px 40px rgba(0,0,0,.35);
    }

    .fallback {
      margin-top: 12px;
      padding: 12px;
      border-radius: 12px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      font-size: 14px;
      line-height: 1.4;
    }
    .fallback a {
      color: #9ad5ff;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>Кейтеринг — 18 апреля</h1>
      <p>Открываем интерактивное меню и закупку прямо на этой странице.</p>
    </div>
  </header>

  <div class="wrap">
    <!--
      ВАЖНО:
      Положите этот файл index.html и файл «Интерактивное меню и закупка 18 апреля.html»
      в корень репозитория (Folder: / в GitHub Pages).

      Тогда src ниже будет работать.
    -->
    <iframe
      class="frame"
      src="Интерактивное меню и закупка 18 апреля.html"
      title="Интерактивное меню и закупка 18 апреля"
      loading="eager"
      referrerpolicy="no-referrer"
    ></iframe>

    <noscript>
      <div class="fallback">
        Для работы интерактивного меню нужен JavaScript.
        Откройте файл напрямую:
        <a href="Интерактивное меню и закупка 18 апреля.html">Интерактивное меню и закупка 18 апреля.html</a>
      </div>
    </noscript>

    <div class="fallback">

      <a href="Интерактивное меню и закупка 18 апреля.html">Интерактивное меню и закупка 18 апреля.html</a>
    </div>
  </div>
<script>window.parent.postMessage({ action: "ready" }, "*"); 
 
window.console = new Proxy(console, {
  get(target, prop) {
    if (['log', 'warn', 'error'].includes(prop)) {
      return new Proxy(target[prop], {
        apply(fn, thisArg, args) {
          fn.apply(thisArg, args);
          window.parent.postMessage({ action: 'console', 
            type: prop, 
            args: args.map((arg) => {
              try {
                return JSON.stringify(arg).replace(/^["']|["']$/g, '');
              } catch (e) {
                return arg;
              }
            }) 
          }, '*');
        }
      });
    }
    return target[prop];
  }
});
</script></body>
</html>
